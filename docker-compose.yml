services:
  db:
    image: postgres:16
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  odoo-init:
    image: odoo:18.0
    depends_on:
      - db
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    command: >
      odoo -d odoo -i base
      --db_user=odoo --db_password=odoo --db_host=db
      --without-demo=all --stop-after-init
      
  odoo18:
    image: odoo:18.0
    depends_on:
      - db
    ports:
      - "8067:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons/custom1
      - "C:/Users/stcor/Documents/STCORP/Odoo/ODOO_STAGING_PT_DIRA:/mnt/extra-addons/custom2"
    command: odoo --db_user=odoo --db_password=odoo --db_host=db

  # odoo17:
